databaseChangeLog:
  - changeSet:
      id: 001-create-wallets-table
      author: Viktor Sergeev
      labels: wallets-table
      changes:
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: number(19, 2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: wallets
            cascadeConstraints: true